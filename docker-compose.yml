services:
  db:
    image: postgres:17
    container_name: lumora-postgres          # ← nombre del contenedor
    environment:
      POSTGRES_DB: lumora                    # ← nombre de la BD
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - lumora-db-data:/var/lib/postgresql/data   # ← nombre del volumen
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  lumora-db-data:                            # ← y aquí también